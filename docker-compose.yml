version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: datasync-db

    environment:
      POSTGRES_DB: datasync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ad@15790

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: datasync-app
    container_name: datasync-app

    depends_on:
      - postgres

    ports:
      - "8081:8081"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/datasync
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Ad@15790
volumes:
  postgres-data: